body:
  text: 靖庵說醫醫之為道至繁雜也至簡要也至活潑也至一定而不可移易也易曰易之為書也不可遠為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要唯變所適又曰初率其辭而揆其方既有典常苟非其人道不虛行明乎此理而後可與說醫以血流漂杵之法讀醫書謂之無罪而戮民少年之子弟學書不成無業可執父兄乃命之以學醫是害其子弟也又害其子弟以害及於人也又或廣開學舍任人入學以學醫其學問程度如何其識解高下如何皆置之不問貿貿焉授之以醫書命之以切脈是誤人子弟也又推其誤以誤病家之人豈不謬哉輕浮乖謬不可學醫迂牽固執亦不可學醫豪放自喜不可學醫謹慎太過尤不可學醫必也心光靈敏精氣完足學問明通識解超邁而又處之以決斷無遊移畏葸夫如是而後可與說醫而後可以學醫既有是數者而後可以學醫矣則必有一片慈祥愷悌之衷腸又必有一種體貼周密之情意夫如是而後可以救人夫如是而後可以濟世有利市之心者不可以學醫吾治其疾而瘳焉彼感吾之德而有所饋遺吾則受之而心安吾無其術而徒索其金則其心不可問矣遑問其術哉天下何術不可操而必操此毫釐千里之術何哉謂確有所見而用方有秩序補泄有遲早是也若故稽延其疾而好為再三之說留其劑以為索金之地其術雖精其心實謬吾果精吾之術而飢餓不能出門戶儕輩中亦斷無不相扶持之理而況必無其事耶而何苦孜孜焉亟亟焉以效市井闤闠街市之謂之所為耶盡信書則不如無書醫書尤甚最可怪者四子書五經之類一切背之而馳獨醫書則斤斤墨守不敢稍出其範圍此何說也醫書之自鄶者無論矣靈樞素問醫書之至古者也黃岐距今幾何年中間又遭嬴火古籍簡版零星安知無遺失殘缺之病其上者穿鑿附會以求其通其下者則抱殘守缺以傳其謬仲景醫中之最古而最良者也傷寒金匱距今幾何年雖較黃岐為近而中更數代坊市流傳安保其毫無差謬耶況方劑之升斗斤銖其數目有毫釐千里之謬耶是故讀書者當觀其通通者玩而味之疑者闕之無強通其所不通無強疑其無可疑大抵通者理之近於人情者也疑者事之乖於日用者也若夫升斗斤銖本不符於今日之用又安用斷斷以察之萬事萬物之理皆通於醫聖經賢傳之旨亦通於醫易曰化而裁之存乎變推而行之存乎通神而明之存乎其人默而成之不言而信存乎德行此非理之通於醫者乎不言而信存乎德行學問效驗皆在乎此學者深味而自得之吾不能言其所以然也記問之學不足以為人師古不重記問也若夫醫則不得不講求記問之學矣醫家之書充棟汗牛安得一一而記之記也者記其理道之至精而至通者也若方劑之蕪雜草木金石之繁瑣記其小者粗者忘其大者精者安能濟哉執其簡以馭其繁握其一以驅其萬提挈綱領變化貫通亦何用乎委瑣齷齪之為耶陋者恐不能記乃約舉其名物編為歌辭以利學者何其愚歟醫以切脈為最要脈以平人之脈為最准多切平人之脈定為宗主過與不及病乃生焉過者為急為數不及者為遲為沉若浮也洪也弦也過之類也若細也緊也濡也不及之類也平人之脈維何和而緩也秦醫謂之和緩者非真名為和緩蓋脈貴和緩故藉此以為秦醫之名以便於敘記亦猶蒙莊所謂臧榖牧羊臧榖乃寓言耳有過與不及之脈乃有過與不及之症是何種脈是何種症是何種方劑三者合而病愈焉東脈而西症者有之矣東脈而西症而又南北其方劑可乎哉如此脈而如此症者常也如此脈而不如此症者亦常也是所以貴乎問也有與症相反之脈則有與症相聯之症有此症必有彼症此所謂相聯也要而言之有脈中之理即有脈外之理詳考而慎察之徹照而敏思之自有特見無難施劑而立愈也然非聰悟沉摯之人不足語此說病非易易也病家只求其病之瘳情急語亂忽東而忽西顧此而遺彼不成條理不成片段無足怪也醫者毫無把握不知頭腦零星而記之記一症則施一藥立方之時病家才言尚有某症則補一藥立方之後方已交於病家忽云尚須加一品否則又刪去一品又否則增減其分兩何其傎也是皆不知宗主臨病則拉雜以進其貽笑識者匪淺鮮也切其脈問其脈象應有之症定其脈之落干某家考其病之因何而起提其綱領刪其一切或補或瀉直搗其巢如是焉有不起沉疴而立愈者哉病家不知病情不識方劑其心中已皇皇然而醫者尚以危辭聳之謂此病宜早防須防危險以為將來雖死而無惡於我之地位究之其病非危症也其症無險象也即令危險或病家不知病情不知脈象徒震於外貌而兢兢焉以為可慮又或真危矣真險矣病家恃醫以為活而醫者則屢聘之而不應是皆無當於事情也歐陽文忠公之言曰求其生而不得則死者與我皆無憾也醫者當以此二語為施治之先河不求其生是不仁也不能求其生是不智也吾竭吾之學吾盡吾之心萬計千方雖繁不憚真無可救則是文忠公之所言也吾無罪焉耳醫者殺人之術醫者又仁術也只問其學之精與不精其道之大與不大其識之確與不確其心之仁與不仁仁術與殺機決之於此而已矣病家之人其長者為一家之主有關係者也病則鄭重以將之理之常也或為其婦或為其子孫或為其所屬其長者愛憐而護惜之相與為休慼其關係亦不可謂不重且大何者長者之生命繫於其所屬之人也醫臨病家其家中之性命皆托於醫者之一身醫者不鄭重以將之是醫之罪也病家出以輕心一切簡率禮貌不及形神不屬是則病家之罪也病家心誠求之醫者至誠無二誠與誠相感而相應自有一種可以已疾之理方劑之施猶其次耳吾不敢自褻其道吾不敢自貶其心慎重不慎重吾一見而知之無所逃也欲學醫而不通理道不達人情皆不足與於斯也五經四子書諸子百家醫學之源也尋常日用萬事萬物醫學之輔也學問閱歷相輔而相成其識自高其理自足若夫墨守醫書強記方劑即精矣亦一隅之學也而況其斷不能精耶切其脈有何象即應有何證依其脈以叩之殆十中八九矣不知者以為神也而不知此樸實之理也非神也至其神妙之處則筆墨不能傳口舌不能宣也吾於病家敘脈象有云左尺無秩序有云肝脈有非旺非郁之象此乃窮於詞也不得已也其真象余獨知之不能共喻諸人人吾更服吾祖之精幹醫學而一無著述職是故也驗方新編俗書也一方也臧服之而效榖服之而不效是刻舟求劍之說也症之種類有千有萬以治臧之法治榖猶且不可況以渺冥恍惚之道行之哉其所列之證與所見之證與之相合矣其所列之方與所見之證必不合也即合矣亦幸而偶中也必未可嘗試也且也有陰症似陽陽症似陰實症似虛虛症似實舍脈從症舍症從脈之各各分別以俗書中所列之方投之輕則錯誤而延其病重則可以殞命戕生夫豈可苟焉己乎天下事有可以抱此俗書而可以不延醫者乎誠如是也則醫可廢矣以是知切脈不可不講求也不工其切脈之術而漫焉以臨是其與俗書何以異五臟心最無病心之用至靈而其質最頑有包絡又有連網以障護之陰陽寒暑之所不能侵也其次腎無病腎之部位極深邃呼吸之間必有邪氣下吸於腎而腎獨不受呼吸之氣所以養腎之真元正氣則納之邪氣則隨呼氣而出故腎得不病肺之百葉有開有合風寒乘之則病燥火乘之則病故肺間有病者以有開合之故多病者莫如肝脾脾主飲食肝主憂慮二者無日無之無時無之脾病不能食肝病不能眠兩家最易病也脾病易愈肝病難愈蓋脾主運動水穀易滯又或加以酒傷故運用不靈其病多滯肝主疏泄太過則旺不能疏泄則鬱鬱則其病疼痛旺則其病昏眩脾只一病肝有二病也脾性惡濕喜燥得苓朮而掉運即靈肝藏血血漸減漸少肝遂失其所養而病乃叢生此兩家之病其愈有難易也養生之法飲食得宜脾不受病思慮不過肝不受病則眠食皆安百病無自而生矣肝氣太旺則燥太遏則鬱燥與郁均不得眠矣肝氣和則血足血足則陰氣足陰氣足則鼾睡鼾睡則仍生血余嘗有言服熟地一兩不如鼾睡終宵此自然之生血較之服藥有天淵之別也凡病不能食猶可言也不能眠則病甚矣不病而不眠猶可致病況病而不眠乎脾氣可以固至七日不食尚不足慮七日之內病除則能食矣若一宵不眠肝不得安血無以養陰氣不潛水火不交病只一二分不眠則又加一二分是以不眠甚於不食也脾之化谷易化水難水亦有精粗之分其粗者由小便出矣精華則輸入皮膚骨髓以滋潤澤者也化水則須火足火足則水質之清濁分火不足則不能化水水將氾濫且恐奪真水之權也酒傷脾何也酒有水氣有烈氣胃喜燥故酒之烈氣胃受之水就下故酒之水氣脾受之酒氣烈胃必求救故劇飲時喜食水果而果之水氣脾又受之其冷性脾雙受之飲酒太過胃燥脾濕遂成關格之症此症最不易愈以浸積之太深也胃性雖喜燥而津液不可枯胃管如鄉間所用油筒其中潤澤如油食乃易下如人食飯食人五六十粒用齒力齧爛者不過十成之二三其餘未齧者則恃此津液以溜下之傳至胃囊口而少停焉如燥太過而津液漸枯則所食之物先不得入胃管之口已入胃管又不得傳入胃囊於是有反胃嘔吐之症好飲者不能勝酒則必好吐屢飲而屢吐胃氣之逆習慣為常於是津液枯矣津液既枯而胃管之中變成一干枯蹇澀之象如牛皮之底裡其艱苦殆不可言狀始而嘔吐後並不能嘔吐且有見食而不敢食之時顛連困苦將以餓終可不懼哉罌粟之害亦有與酒同者罌粟性寒而兼澀最傷脾土種罌粟之地不能別種稻麥即此理食時與燈火相近燈火之燥氣胃受之食罌粟者好食茶好食水果亦胃求救也胃之津液漸枯又加以脾之寒濕脾濕胃燥亦關格之機也此理之斷然不爽者菸酒兩嗜則更重矣心肺居上焦脾肝居中焦腎之水火居下焦肝為心母腎為肝母脾為肺母肺為腎母子病補母母病瀉子其理固通然肝脾肺腎各有自病之原因金水雖相生然腎病只補氣而不滋水可乎土金雖通氣然脾病只補肺而不扶脾可乎惟心家之病可以責之於肝如心煩心悸等症則專理肝氣亦可愈不必贅以心家之藥也切脈之道兩尺無病者多其病者兩關累之也或脾滯鬱火肝鬱遏水或脾旺生火肝旺爍水此類症殆十常七八左寸旺是肝累之右寸旺則脾火上升或屬自病左寸短是心血虛右寸閉是風寒結澀此尺寸兩脈之大概情形也若夫兩關之脈脾之滯肝之旺與郁其常也脾滯亦弦弦則痰壅之也脾滯亦緊緊則寒束之也肝脈之弦為本象肝脈之郁不得遂其疏泄也肝脈之澀則血虛也肝脈之浮則未善睡也此兩關脈之大概情形也皆舉其極粗淺者言之若夫補土以培木滋水以熄火壯水以澤土此則理道之稍進者實驗中不少此類此則非徵實不足以明斯理也心家真病近無此症心家所謂病者不過微有火象心本火體其象本散是炎上之勢無真散也凡心病氣則調理肝氣血則滋補肝血夢遺是心病君火為之也自遺是腎病相火為之也治遺病必須用君相調和之法徒澀無益也腎火旺則泄之腎水涸則滋之壯腎水以泄腎火澤肺金以滋腎水此探原之法也眠睡之安不安肝主之故睡夢之中惟遺精與流淚兩者與醒時無異淚為肝之液精為肝之血故真也睡何以夢魂為之也肝主睡肝藏魂故睡後魂遊血足者無夢魂不得動也老人多夢血虛也孩兒易驚血未長足不能定魂也夢多異境肝能構象也夢登高而忽墜者魂驚也莊子曰至人無夢其說不可信脾開竅於口肺開竅於鼻肝開竅於目腎開竅於耳心開竅於舌舌無竅寄竅於耳心肝腎之竅其經絡從何而來皆從咽喉而來也咽喉為各竅之總門咽只通肺喉則各家皆通何以驗之以黃連水塗於目而喉間知苦以小毛帚掃於耳而喉癢發咳大笑之後眼淚交流嚏涕之時耳門閉氣是知各竅皆相通也即此可知喉症之變以喉症專屬脾熱者可以恍然悟矣人有初睡著而忽醒醒片刻而仍睡著何也陰氣稍不足爾將睡之時陽氣歸於命門陰氣不足不能驟與陽氣洽故陽氣仍出而醒譬之賓客初來主人不甚殷勤則客去主人已覺再有客至則相孕洽矣心火散體入夏火司令故尤散生脈散之五味子斂之也心家之藥品多斂心主脈斂則脈生矣兩乳之間謂之膻中膻中者大氣之所在也大氣亦謂之宗氣宗氣所在之處如遊絲如棉絮不密不疏空中盪漾養之得法其和自和若有邪氣則正氣漸退正氣求伸與邪氣爭竟則有痛症俗家不知謂之心痛又謂之胃氣痛皆非也因而知桂枝湯之可以治大氣也桂枝祛邪白芍斂正甘草和中而大氣之痛止矣今人稍有寒疾或有他症輒曰氣悶曰胸口不開闊曰兩肋脹痛皆大氣之病也凡症有一寒症即有一熱症如厥寒症也而亦有熱症蓋熱氣結於中焦故厥也泄寒症也而亦有熱症蓋熱氣逼於脾家脾不能化故泄也便結熱症也而亦有寒症蓋寒氣凝結於大腸或肺為寒所閉故結也白喉喉痛熱症也而亦有寒症蓋寒氣鬱結蒸而為白逼而致痛故白而痛也他如咳嗽有寒症有燥症又有肝風入肺之症又有胃風之症嘔吐有寒症有熱症又有風氣上逆之症凡症不可執一以求之則切脈之道為最要也氣腫尚可治也水腫難治肺主皮膚益氣散氣尚易施力水腫則不易易也扶脾氣使之化水而既腫難化欲引入小腸則既已氾濫引之未見其從令也水腫雖為水然仍氣也所飲之水脾化之肺統之脾病不能化水肺亦不能統水水反侵蝕肺氣奪其主掌皮膚之權氣腫有夜起早消早起夜消之時水腫則無時而消也水腫既久氾濫足以奪真水之權故並小便而亦澀也迨至皮膚潰裂水流不止則苦不勝言而亦無可施救矣臟腑者有定者也脈症者無定者也知有定者受氣之理而後知無定者受病之因醫者坐於家中不知病者之何所病也亦如學子應試不知試官之試以何種學問也是病者之病無定也醫者一入病者之家則病者之或寒或熱或虛或實病者反處於有定而於是醫者之靈機妙用運掉活潑得以展布於一時始則醫有定而病無定繼則病有定而醫無定醫者活人之術也切脈不活運藥不活又安能活人乎故醫者當思所以執簡馭繁之法執醫馭病而頭緒繁多將如之何而後可哉醫者第一不可輕用補藥第二不可好用凝滯之藥品第三不可將陽病引入陰分如是三者皆謂之無識補藥不可輕用亦有時可以不用病去則不藥以飲食起居調理之足矣病者不明醫學貿貿然曰當補醫者則從而和之亦曰當補試問一器也破爛則命工人補之未破爛何以補乎器之中尚有垃圾之未淨也而遽施以綴補乎嘗見有太陽少陽之症不為之表散誤投補劑後竟成瘵以此殺人絞也非斬也何也必歷之又久而後死也此補劑不可輕投之說也人之一身其血氣周流而不息無時或停者也停則病生焉於是乎有食滯有氣滯有風寒之滯有臟腑之滯有經絡之滯婦女之停經小兒之驚風無一不由於滯者也然此猶半由於自滯也其一半則由於誤投凝滯之藥品也乾坤之旋轉日月之運行夫豈可少有滯機乎哉小而言之西人之鐘表無時而可停也修理鐘表曾試用中國油今統用外國油取其清薄如水無一毫稠濃之弊蓋深恐膠黏稠滯不利於行機也由是而推便可知人身運行之理便可知醫病之理尤可知醫病而不宜凝滯之理此不可好用凝滯藥品之說也一表症而誤用當歸一咳症而誤用阿膠皆引陽病而入陰分者也既入陰分再誤其劑則愈久而愈深雖搜之剔之而莫能出既莫能出而臟腑已受其傷甚至有因此而戕生殞命者吾所見亦既多矣此不可將陽病引入陰分之說也此三者尚為極淺近極顯豁之弊而其極至於殺人而不覺此則識見不及於眉睫學問不得其要領余特揭而出之能識此三者則病易愈而劑不至於亂投不能識此三者雖凝思渺慮而不能知其所以然而病家之病乃日延而日深至於無可救雖有善者無如之何亦徒嘆其愛莫能助而已矣可無懼哉誤服方劑而死者余得見三人焉此指今年而言一寧波之孫姓餘四月往診其病起於舊年二月初起咳嗽而已自服梨汁杏仁之屬亦勿藥也至四月而更劇蓋寒氣入肺未經表解遽服清潤之品寒已盤據干肺家而不得出由是眾醫施治百劑雜投病象日劇而日深延余往診之時形容瘦削神氣疲不可言狀症則少食而不能眠也脈則細數而無秩序也百症之雜殆不可以更僕數余亦明知其不能治而其妻泣涕而請之姑為之調達其肝扶助其脾姑慰其侍疾者之心而吾已計無所出矣邪據其室正棄其權扶正則礙干將傾之廈逐邪則礙於已覆之巢兩無所施束手無策只得以和氣血無弊而微可取效之品投之而已半月之中屢強請而屢應之至第四次而症愈劇脈愈不可言狀余不立方又強請之余曰此敷衍之說也越日而卒此孫性之事也一長沙之黃姓四月得咯血之症六月初延余診治細察其面榮似無病者然臥不能起入夜便發熱口渴目不交睫者已半月矣其證則因四月咯血一次幾近兩面盆神氣不得支持蓋系用心太過所致脈則左甚數右亦無神而肝脈獨細左尺寸均不好看其夫人乃出其所服之方以示余曰初起則服此方也蓋不知其病之發於肝而專潤其肺肝有病而不得治肺無病而誤治之又曰繼而服此方也則有參耆苓朮之屬焉蓋肺得潤劑自神疲而氣短於是乃扶助其脾肺之氣不知肝之失血過多妄投參耆失其所養陰氣其能受乎又曰繼而服此方也則有熟地龜板之屬焉蓋陰氣不能受參耆之升提則陰將漸涸以其不能睡也於是借龜地以潛其陰究之病在肝而不在肺入手便錯後則一誤於參耆之升陽再誤於龜地之潛陰升陽則肝腎受其累潛陰則脾肺受其累此病為藥累馴至於不可治其夫人甚以余言為然然已無可施治已肝無血以養心腎無水以養肝肺無力以生水脾無力以生金是絕症也余開一雙關飲以敷衍之越三日而卒此黃姓之事也一為余之侄曾孫僅三歲端午日食鹽蛋米粽已受其滯不覺也醫者未知其滯只覺其虛乃以六君子湯又十全大補湯又六味地黃丸雜投亂進久之而臍下有一塊亦不覺痛楚乳媼重按之始微有所痛一切如常人亦不覺其病也至中秋後而痛作矣患痢症氣墜特甚時坐於桶不肯起延余往診則正以參耆附桂之劑進也余曰手足左熱而右冷口乾發渴而氣墜此中焦之不通利也余謂侄孫女曰竅將閉矣行將起驚矣以通利中焦之劑投之無濟也越日而死此余之侄曾孫之事也觀此三事症絕而脈不遽絕死機早伏而猶懵懵焉妄投其劑豈不可哀也哉海上之風受之者無不病也而東方為尤烈蓋東方大海一無遮蔽自東來之風有潮濕氣水濕氣寒氣熱氣自空處來故寒自日中來故熱凡致病之氣無不備明其受風致病之原乃得醫病驅風之理有人以陽痿症問余曰此病確係火衰乎鹿茸可服乎余曰此病謂之火衰固亦有近似處然專服補陽補火之品則非徒無益而且有害間曰何也余曰生殖器為海綿體非血壯不得舉其舉也血力盡灌注於此君火相火皆運籌帷幄者也其決勝千里者則血也血之熱力足則生殖器無痿理也譬如凡機器之行火力最要而水力萬不可少此即可以悟陰陽相需二者不可缺一之理是則治痿症不可不大補陰血也專補陽火無濟也若服鹿茸則非以龜板膠合服不可且鹿不過五之一龜則可以五之三也東西南北四方之人賦性既異賦質亦不同此理之固然也然極北多燥而近亦有濕症極南多火而近亦有寒症非時候之不同也蓋風寒暑濕燥火六者未必能擇人而施之也不過北多燥而南多火耳楚有沉溺重墜之疾固也齊侯之疥非濕症乎孔子之疾病伯牛之有疾惜乎不傳其症也顏子之短命從者之莫興亦惜乎不言其所以然也醫者有一大忌最忌以自己之體氣繩他人之體氣吾見因此貽誤者蓋不少矣我最宜於附片而以附片施於人人我最宜於大黃而以大黃施於人人何其紕繆之至於如此也其不通孰大如是世俗之論輒曰某也補藥醫也某也熱藥醫也某也涼藥醫也世俗不知醫固無足怪然循名以覈實則其平日之近於一偏殆其習慣耳執一偏以臨病家安得天下之病盡吻合於我所操之術哉世俗更有一論曰此看書之醫也據表面聽之其詞非不美醫而能看書豈非良善然實則曰此醫也食古不化也世俗亦未知食古不化之何說然此醫平日醫病之無甚效驗概可想見彼以一症來我以一方與之症與方合服之而效亦安有此譏諷之談哉病之得於人也千奇萬怪至無方也我之醫其病也千頭萬緒有一定者也東其病而西其方張其方而李其病其悖謬固不待言矣或臨一症而不得其要領症症而治之治一家而不知其生克家家而醫之究之方則叢雜而大多藥則牽制而相礙此則無論其不效也即效矣亦節節為營之法易一症則束手矣再易一症則辭之矣治病治其筋節得其筋節餘症則不治亦當愈取效取其最先雜症則治之無妨緩此不可不知也此至簡而至要之法也腫家之脈不能切也其兩手皆腫矣何從而切其脈乎不切其脈又何從而施治乎未切脈時先令侍疾者舉其兩手令其腫氣退至尺澤不過數十分鐘而脈現矣脾肝兩家病最多而最要前既已言之矣余再申其說而罕譬以明之譬如入人家之門其門則木也其牆壁則土也由門而入則無處而非土非本也金則升其堂始見之也如茶碗之盤如懸掛之燈如陳列之各種五金器具之類且凡金之屬時出之而時收入非如土木之永列於外觀也蓋非土木無以成室家矣至於水也火也則列於至深而極邃之處也水火列於廚灶之旁一定而不可移易亦非有出納之時且為他人所不能見也由是觀之水火藏於至深非腎家之喻乎金有出納之時非肺家之有開有合乎木土無處無之非脾肝兩家之喻乎水火深難於受病金有開合間有病木土無處無之至易病治病之道先從木土著手必無錯謬切脈時先觀其水火之何如繼觀其金之何如皆無慮矣則專從土木施治焉識高則膽壯余幾經審慎而得悟斯理也吾將行吾之道以濟世也則必使人足以信之人之足以信之則必平日之醫病而著有成效也醫病而著成效則必學明而理足心靜而識高也欲識高而理足專恃醫書不可專恃醫書者雖十年不下樓終無進步酒之為害吾前既言之矣僅言其貽害於脾胃也而又貽害於肝膽以極謹慎極謙遜之人每至酒後輒大言不慚據傲鮮腆甚者使酒罵坐大聲高嘯又甚者飛拳哄鬥裂器毀物平日所決不行之事竟任性而為之平日所不出口之言竟肆口而說之是非肝膽之氣使之乎肝膽受傷脾胃受傷酒尚可飲乎且大醉之後心光不靈平嘗所見到之道理到此一切不復記憶無禮於親戚開罪於友朋是則心氣亦受酒之累矣然心氣之受累肝膽為之也酒後小便全系酒氣是又肝膽移之於小腸膀胱也一醉之後脾胃先受其傷肝膽次之心次之小腸膀胱次之是一醉而全體皆受其累其表面則喉干舌枯眉目不甚清醒昏昏欲睡譫言囈語各象畢露酒尚可飲乎哉然而酒以和歡酒以養老未必在禁止之列必也半甌一杯少飲而緩飲之低酌淺斟不待微醺而輒止是不僅無害而可以有益也周身之氣血骨節之經絡得酒而可行也得酒而可和也古方中有借酒以行藥者酒豈可廢乎哉是在飲之者能得其道耳酒之中有味也有趣也如世俗之飲酒哆其口而執壺以灌之惜哉斯酒也哀哉斯人也解酒之法第一以高麗參為最妙蓋酒奪正氣之權正氣不能勝酒氣故飲而醉也高麗參一助正氣正氣得權則酒氣自消退矣其次則粉葛根也葛根所以升正氣其意與高麗參同功但葛根不如高麗參耳又其次則枳椇子也傳聞有枳椇樹之處造酒不能成誤以枳椇木為薪者更不能成酒也蓋酒之曲糵中有羌活防風枳糵可以解羌防之性故可以已醉以至硬至生之米一宿而熟之且出其菁華而可隨時為飲焉其曲糵之烈至如此況其為血肉之軀而受此烈性也可無慎哉周耕畲之入醫院也七日而瘳黃士龍之入醫院也三日而斃蓋醫院所用之藥水涼水也耕畲患溫症內熱極重故服之而瘳士龍患寒症脾滯下利故服之而斃命有修短事有幸不幸天也而人在其中焉數也而理在其中焉其如不明事理而篤信醫院者何哉康子饋藥拜而受之曰某丘未達不敢嘗嘗藥之必知其為何藥也明矣譬如人之食欲必問曰此何餚也問其名而後食之又問曰此何酒也問其名而後飲之知其為何餚何酒此則所謂達也最奇者臨食飲必問之而於藥水則不必詳考而細察之貿貿然見其水瓶之外曰此治某症彼治某症則歡欣鼓舞而食之而飲之絕無一絲毫遲疑之意謂勿恤生命而輕於一試乎則其眼藥水之本意欲已疾也謂其篤信西醫乎何以捨命而信之也如其真篤信西醫也則必通西人之語言識西人之文字達於西人之藥名藥性研究西人制造藥水之理道則其服之也雖不得效尚無愧焉如其不然則早挾一犧牲生命之意以博一酷嗜西學之名名則美矣而使血肉肌膚臟腑經絡實受其害吾不知其用意之所在也吾向無薄待斯人之意亦更無薄待西醫之意實因不學淺陋未嘗從事於西人之語言文字語言文字之不通遂售其物事而不知其名睹其招貼而莫曉其說乃不敢從而問津焉西醫全體之學西醫解剖之學吾亦嘗請事而略聞一二大率西醫重實驗中醫重理想中醫亦嘗借牛羊豕解剖之實驗以為說矣然而橫行與豎行既異人臟與物臟微殊終不若人與人對觀之為愈也心肝脾肺腎五家大腸小腸膀胱膽三焦之六腑尚猶可理想而得之至於經絡之關節骨格之部位血輪之流行血管之轉輸穴道之微茫精溺道之殊別子宮經道之寬窄陽器陰器之道途此數者非實驗不可欲實驗則以蠟人為底稿可也能將以前數者之大要了然於胸中是猶熟悉堂奧而後可施以概茨明曉溝渠而後可用其浚治非盲人之騎瞎馬如熟路之駕輕車事半功倍厥效匪遲夫豈可輕詆西醫哉華人病則延西人以醫之西人病未聞延華人以治之豈華人醫學之未精歟抑豈西人病情之不同歟謂中西病情之不同何以中人病而可以延西醫耶何以西人病而決不延中醫耶謂中人醫學之不精則當研精極慮以求其所謂至精而至神者若西人病而不延中醫已有不勝慚恧之思焉又何至一有疾痛便囂囂然曰請西醫也哉既延西醫一若我之病西醫治之雖死可以無憾究之西醫醫治之後問西醫之說病情何如也則茫然也問所服之藥水何名也則啞然也其上者而以詰屈聱牙之三四字稱之問其當中國之何藥也問其藥性之屬寒耶屬熱耶則又啞然也噫以有用之身軀而服此不知名字不知性情之藥餌衣服在躬而不知其名為罔此豈僅謂之罔也哉不待解剖而即知病情之所在西人亦曾服中醫之神矣究之中醫之所以能神理想之神也理想之徵實處則切脈之道也言活處則西不如中言呆處則中不如西若夫活處不明理想不神竟肆口以詆西醫謬矣或崇拜以稱西醫亦謬矣究之西醫之良否中醫之良否本未嘗從事於醫安能知其深淺乎病則挈其命以付與西醫此亦迷信之徒也平日偶遇醫士先問曰西醫乎中醫乎旁觀者答曰中醫則掉頭而不顧焉矣問掉頭者之果為西醫乎則無論中西於醫學未嘗問津也與此類人而與之言活處言理想殆所謂更隔蓬山一萬重也噫一病而即延西醫是何說也此好名也世變當新舊競爭之交群譁然崇拜西學也究之西學之精美處啞然不能知而獨於醫之一事則不惜欣欣然以就之以全其好名之心其卒也西醫治之而無效於是張皇錯亂顛倒雜投以馴至於殞命戕生否則捐其血肉之軀以供其剖割迨至其氣既泄皮囊不存而後悔其事之舛謬也亦既晚矣好名而不克全其生其為毒也不亦烈乎衛生之法吾得一說焉曰鑿井而飲耕田而食帝力於我何有哉日出而作日入而息不識不知順帝之則是衛生要訣也彼侈談宮室起居日用飲食以衛生者謂之無識無學顏子之短命豈簞瓢陋巷足以致之域陰房鬼火牛驥同灶亦且延數年之命其何說之辭醫家切脈之道不可不講求也吾嘗聞吾友鄧春舫之言矣春航湖北荊州人居於沙市其醫學極精善用經方經方可以借用其醫經之熟可想而知當時余未習醫也聞其言曰學醫當先切脈脈既熟而後可以開方歷述其學醫之初先考求切脈之法從其師遍歷病家彼先切脈始而述其脈狀告之於師師切之而辨其是非久之而立方矣陳之於師師為之刪改而點定之三月之後脈與方皆與其師符合而後閉戶讀書所讀之書皆至精而至要一年之後百醫而百效矣大凡弟子從師一文也一詩也皆寫之而陳之於師師教之以定其是非可否此有實跡之可尋也醫之教人醫也空空洞洞令其看書無一毫實跡之可尋識不明而志不定出則誤人矣春航之師以教詩文之法教醫春舫即以學詩文之法學醫如是則非空談而有實驗矣春舫天姿絕優其學亦精余相交時年只二十餘所醫病應手輒效無論新舊標本之病皆能探其癥結而治之春舫學固精而其師傳授之法亦非凡近可以企及惜乎其名不傳而春航以微僚末秩終於岳州之陽陵無片語隻字傳於後世余及其時而不知醫及知醫學醫而春舫已死無從收其遺稿而傳布之其情可哀其學可惜吾特標而出之以存春航之名以存春航之師傳授之法以告天下後世之學醫者醫者執法之官也切脈者閱其呈詞也問症者訊其供辭也開方者定其讞也供辭與呈詞情實相符而讞定矣病症與脈象相符而方立矣且呈詞有詐偽無情之弊供辭有狡展不承之弊迷離變幻百出其計以相嘗試執法者非明足以燭其奸斷足以服其詐其讞終不能定也若夫脈象則無詐偽也病症則無狡展也一脈一症百症百脈顯豁呈露無不畢現而醫者尚不免失出失入之罪以此執法安能稱厥職乎其不敗也幾希矣執法之官能生人而能殺人者也醫病之醫只可生人而不可殺人者也執法者妄殺人則彈劾及之褫其官而永勿用焉雖不足以服冤者之心亦足以懲做於天下醫病者妄殺人則逍遙法外莫得而罪之且自詡操術之不謬而反咎病家之不能相信焉於是而冤益深而醫益謬愈推愈廣殺人無算豈不可哀也哉犯法者有首從重治其首而輕治其從甚且其從無關緊要則釋之病症之來也亦有緩急輕重之別焉亦猶犯法者之首從也擒賊擒王切脈之時審其要害之處從而治之其相因之病有不待治而自愈者可無節節而為之也有一種不相因之病亦有不可忽略者如血家之病不可以不理其脾氣家之病不可以不安其肝蓋本無病而防其相因耳然本無病之家又不可妄動以起其病是在醫者之靈光足以照之而運用之妙又無滯機焉爾有謂切脈可以看其年壽之修短者吾竊以為不然脈象之好劣理也年壽之修短數也數可以敵理人定可以勝天則自為調攝之良蓋不鮮矣若我切其脈謂可百年而時疫之流行喉痧之迅疾則非人所能預測者也謂可百年而不可百年其如之何若人死而其家憤激藉此尋仇豈不醫病而反為醫累乎餘切脈而說病即日之事亦不言也而說百年乎哉謂宜預防也則延醫原所以防之也醫言宜預防醫不防而令不知醫者防之乎謂此症甚危險則延醫原欲拔出於危險也不危險而以為危險謂之恐嚇已危險而無術以拯其危險謂之無學問生死定於俄頃優容釀成變端夫豈可草率以從事哉莊子曰百歲人之大齊在凡人皆可百歲也其不能百歲者理亦多端酒食之肥穠色欲之侵削憂鬱之傷損寒暑之侵尋醫藥之錯誤調衛之過度無一不足以戕生殞命是以應百歲而不百歲酒食傷脾色欲傷腎憂鬱傷肝寒暑傷肺五家皆傷焉能持久至於醫藥錯誤其傷已非意料所及而調衛過度暑不見陽寒不離火種類不一不可勝舉以此受種種傷害之人而生育似續安能有強健之軀幹完固之精神哉先天不足根本不牢戕伐既多芟夷尤速以此相傳自難有百歲之期不百歲而短折怨尤天命詛咒空王亦太愚矣婦科之病較男子為多三事經孕產也孕與產料理得法者尚多獨行經一事几几乎百人而百病千人而千病矣蓋孕與產之事重而且險其未曾經歷者必詢之於老或問之於已經皆不勝鄭重之思其貽誤也尚少若經歷一二次則輕車熟路漸近自然斷無老手貽譏之理蓋孕與產人所不敢忽略者也若行經則常行之事又不及孕與產之重而且險其行與否期或遲或早色或鮮或暗母與姑亦安得朝朝暮暮而詢問之老媼不能知女傭不能問一人之事任其自為料理自為調護亦人情之恆然本無須乎矜持太過者也即本人亦視為無關緊要者也於是行經之時始而含羞不言不欲因此而疏其禮節繼而支持強應又不願因此而啟其愛憎況乎飲食則酸辛水果之不擇焉行事則寒暑風濕之不避焉於是身體受病眠衾皆非五官百骸遍體不適皆行經之時未經調攝之所致也其甚者妯娌小姑之垢誶不得承舅姑之歡脫輻反目之間言不能得槁砧之愛又或兒女多故生育維艱姑息養奸門柞蒙垢又或青年矢志黃鵲成歌柏舟吟詩孤鸞獨處凡此不適於心之事率皆憂鬱累肝之端肝氣既傷移累於腎於是行經不對時期天癸或遭阻滯乾血之症由此起焉或服單方而妄施攻伐之劑或延醫士而雜投補養之方顛倒失常乃成瘵症瘵症既成善者亦無如之何矣前事所說未必定集於一人肝病之來因此可成其大半吾診病脈多矣而婦病居十之七八診婦病多矣而例症居十之八九其非例症者奇症也奇症居十之二三不及例症之繁多也例症維何吾得舉而數之焉曰眼珠於痛曰耳鳴耳閉曰鼻孔乾枯曰齒齦痠痛曰咽喉干痛曰口中有火氣曰頭腦疼痛曰腦筋牽痛此頭部之例症也曰胸膈飽脹曰乳下氣痛曰兩脅疼痛曰胃氣不順曰背心脹痛曰肚腹氣痛此上中兩焦之例症也曰小腹脹痛曰軟腰痠痛曰兩腿痠痛曰行步無力此下焦之例症也例症之綱領則曰日不能食夜不能眠而綱領之綱領則曰月經不調其施治之法則不能以一條鞭之法治之也治其頭部之熱則上中下三焦之痛症劇治其三焦之痛症則頭部之熱症亦劇寒熱牽掣施治為難然既有例症自有例治之法頭部之熱非火也三焦之痛非寒也蓋婦科每有肝氣不暢肝陽遏郁之症因肝累脾木剋土也因脾累肺穀氣不能充足土不得生金也肝陽遏鬱而有上犯之熱脾陽不升而有下陷之虞血既不調氣尤不和鬱而成熱升於頭部不和不調之氣血不順其道途四出而為無理之鬧所以有三焦各種痛症此屬悠久養身之病如常山之蛇擊其首則尾應擊其尾則首應治之之法唯有調和其氣血行動其氣血凡一切升提之品陰凝之劑皆不可施或者氣和則頭部之熱自退血和則三焦之痛自止庶幾其有瘳乎吾嘗治一婦人將成瘵矣日更一方隨其例症之所見尾追而治愈之至今猶康健無恙也婦科小產其生新化瘀之法與大產無異夫人而知之矣然而小產第一次三月而產五月而產後每孕才三月或五月而必產何也此子宮瘀血之未淨也第一次產後惡露未曾行盡積而為瘀每受孕至其時胎與瘀相觸而墜矣瘀大則三月觸之瘀小則五月觸之新血與瘀血不相合則胎不能系老溫或咎其閃跌或斥其飲食之不慎謬矣此症須於小產之後極意逐瘀滌盪殆盡而後此則胎穩而孕固矣或者不知妄投補血之劑瘀積愈牢而胎墜愈易吾依吾法行之竟有慣於小產而服吾藥方居然繫住者要之瘀不蕩淨雖趺坐終日仍不免於墜也一定不移之理也月經阻滯是氣血不和之故和其氣血不問其行與不行也而自然必行也攻伐與補養兩謬之道也癆瘵之症甚鮮也如其先天不足體質細小則生不久而夭折矣如其後天不足乳汁缺乏則病相尋而無已時矣癆瘵者半由於少年之不自珍惜半由於醫者之誤投藥劑其不珍惜也貪酒而縱色欲性躁而心氣不寧喜怒任其性情晝夜失其常度當食而不食不免有過飢飽之時當眠而不眠且加以戕生伐性之舉始而傷陰陰傷則血不足以濟之繼而傷氣氣傷則陰不足以潛之於是失血失眠百病叢作臥病之中水不濟火相火尤熾土不生金穀氣更缺因是而得癆瘵者其死也尤速其誤於醫藥也始而咳嗽繼而咯血投以潤肺之品而肺氣愈衰投以止血之方而血勢更猛金不生水而水益涸水不榮木而木益旺火不生土而土益衰土不生金而金益爍金爍水涸木旺土衰雖欲驟投補劑而一則措手不及二則補之即所以令其克之補其金則剋木補其木則剋土補其土則剋水補其水則剋火不能生而反克之庸有濟乎治其瘵而成其瘵治其癆而助其癆艱苦萬狀束手無策咎其既往駟馬難追困苦以死何其慘歟癆瘵之症此二種最多一敗於己一敗於人脈象難言病症岐出至此時雖長沙復生恐亦無能為矣可哀也哉咯血之症先看其發乾何家而後就其所發之處而治之焉發於肺而治其肝發於脾而治其腎之燕趙而南其轅適吳越而北其轍是何為哉血發於脾肺猶易施治也血發於肝腎則施治為難矣法官高拱之人一旦下堂而走欲不亡也得乎發於脾肺而肝腎之脈無恙也發於肝腎則脾肺脈雖好而無益而況乎其萬不能好也甫咯血而左尺搖搖不半年而即逝矣左尺搖搖無不搖搖矣其不搖搖者各家之氣不易於即泯也吾見左尺搖搖者非不欲救之而無術以救之只自疚學問之不精而已愛莫能助徒喚奈何吾何人斯而竟聽其死乎心雖良而術不足以濟之縱令終日引咎而何益於病者乎哉醫道與學問之道息息相通也易言慎言語節飲食自強不息嚮晦入燕息剛健篤實輝光書言作德心逸日休作偽心勞日拙禮言和順積中英華髮外論語鄉黨一篇言孔子起居飲食之道綦詳孟子言仁義禮智根於心其生色也然見於面盎於背施於四體四體不言而喻此非衛生養生之道哉誠如是也疾病何自而生哉第一要明白道理明理則人生一切要害處皆能識得透徹而後思慮不妄求哀怒皆中節有此二者則心肝得所養而氣恆寧靜必不至有疾痛之生至於風寒暑濕則外感無足慮即感矣而心肝兩定者治之亦易愈矣或曰子之言誠是也專就士人而言也若夫鄉愚之氓市井之徒閨閣之婦女又烏足以語此哉余曰思慮不妄求哀怒皆中節此二語無論讀書不讀書士人非士人或男或女無不括干此中鄉愚市井妄思財帛閨閣婦女憂愁抑鬱非致病之厲階乎聖人防民防之未然我輩治病治之於未病治未病者卻病也鄉愚市井閨閣其中質美者甚多父詔兄勉遞相告語轉相戒勸未必不可卻災診而登康強況乎鄰媼市娃亦粗知疾病之禁忌某物也誤服之得某病某事也稍忽之見某症此亦世俗習慣之端末必定有至理而其防病卻病之心思則未可厚非也彼讀書之士人而尚世俗之不如哉立方之道戛戛乎其難哉有切脈甚是而立方則非者斷未有能立方而不能切脈者尚有一實在憑據雖不能達其精微奧妙之旨而浮沉遲數弦緊洪細終不難了了也至於立方則若涉大水其無津涯胸中毫無主宰而疑似之間又生出許多疑忌生殺定於俄頃斷無有幾許光陰任其徘徊顧慮倘途境不熟鮮有不南轅而北轍者且也一條鞭之病用一條鞭之藥至無難也有一種寒熱雙治之法溫涼並施不知者疑以為雜然而往往見效有一種上熱下寒之症宜忌兩無所施此中用藥左右為難然用心思索斷無為難之道或專憑理想創為新法或彼此挪移借用古法是在心光之靈敏何如耳切脈如看高頭講章也立方如作文也看講章甚明晰而作文不合法者往往有之梓匠輪輿能與人規矩不能使人巧立方者規矩之至巧者也既曰巧矣則無怪乎人之拙也然則奈何始而研究藥品之性情也考察藥性之入於某家雖不能全備而悉知之而尋常所見之品則不能不一一而知之也繼而考求古人立方之妙用不宜泛覽只專心精求長沙立方之法一方數味一味輕重若何詳考而深思之醫境既熟由博返約詳悉臟腑之性情合以方劑之性情尤宜精煉數方一方可治數十症十數症者懸之筆端以為執簡馭繁之用夫如是立方之時不至茫昧顛倒手無所措且運用既靈心光愈活亦斷無疑難牽掣之虞也切脈不知其所以然是未切脈也立方不知其所以然是未立方也病者呻吟床褥而尚延此切脈而未切脈立方而未定方之人以遲延其時日其情可憫其事可哀死機速矣安能待哉立方之法貴活也貴簡也至呆之方施之於無病之人猶且生病而況施之於多病之人乎哉活有二道一則用藥之活也一則銖兩之活也立一方而拘牽板滯無絲毫活動之意行乎其中如此安能治病乎哉否則應重而適輕應輕而適重銖兩不勻亦不足以愈病若夫簡則非提綱摯領能識大體者不足以語此無病之人調理補養藥品不嫌其多何也五家臟腑每家施以三四品則不為少矣腎之水火脾之痰濕肝之風皆不能不有一二品以安置之於是乃愈加而愈多無病而言簡萬萬不能若有病之人則不可不簡多病之人尤不可以不簡只看其病之發於某家單刀直入直搗其巢病在東而源在西病在彼而源在此刪除枝葉擒賊擒王無枝枝節節而為之則烏得而不簡乎若單言簡少不中肯綮亦何貴乎簡哉活而不簡猶可言也簡而不活何足取乎然能活者斷未有不能簡者也簡則猶可襲取也活則不可偽為也補氣之品可重也行氣之品不可重補血之品可重也行血之品不可重然行氣之品宜較之行血之品而尤輕血有形質者也氣無形質者也遇無形質之物而持挺操戈以擊之是持矛搗鬼之說豈不足以貽笑於天下耳中有小皮如以刀入取之徒傷其耳而不能取其皮氣家之用藥亦猶是也如重行氣之藥徒傷氣而邪因之以更壯如重行血之藥血不行而瘀因之以四散銖兩之間不可不有靈思以驅使之也至於氣血兩補之時則無邪無瘀重用乃有益輕用則無益然此時而用行氣行血之品仍不可以重也行氣之品尤不可重於行血之品也非輕不靈非輕不捷非輕不活氣也者至靈捷而至活之物也用藥之靈捷與活當與之相稱而停勻此則以靈思神其妙用雖口舌筆墨亦不能述之矣參只入肺耆則各家皆入耆為上品至美之藥也然不可以輕用吾嘗見中風症誤服黃耆而因之不語者矣不語則無治矣蓋耆性專主升提中風之證風奪氣權舊說相傳以耆為風症要藥風症用耆所以伸氣之權以制風也然今世之人肝血不足者殆十而八九血不足而肝失所養乃有風症肝血既不足則耆不扶氣而提風風既迷漫復有耆以升提之則風盛而上迷肺竅乃有不語之症肺竅既閉肺無主不足以布令生機既絕無可救藥吾所見屢矣吾以耆治中風只用過一次毫釐千里舊說之不可泥如此吾故嘗言用藥之道貴有心得襲前人之成方而又莫思其所以然之理萬不能中其竅要也當歸養血而適足以燥血柴胡暢肝而適足以伐肝服此二物而失眠者多矣而人不之察以為此婦科要藥何不可服之有殊不知今之血虛者十而八九既虛矣安能不燥乎又安能伐之乎無已吾則以紅花代當歸以桑枝代柴胡當歸生血而味辛性燥不如紅花之平淡也紅花能活血血遇紅色則行能活而行血焉有不生之理哉不知者以紅花為破血之品不知其與桃仁合用者桃仁去瘀紅花仍是生新也當歸無汁紅花亦無汁當歸辛而紅花平其無弊也無疑柴胡者伐肝之藥也服此者往往失眠血症而失眠其為病增劇矣不如桑枝之性淡而能條鬯肝氣也桑枝遇春生長向上桑得春氣獨深又入肝經其枝向上與條鬯肝氣之意相合此物用者甚鮮昔惟李時珍有一桑枝煎用之余思得此藥真婦科之要藥也余用此物時藥店中未備取於人家之有桑樹與夫鄉間之種桑者久之而店中備矣售以善價矣此二者余屢用之而屢效百不失一況乎生血暢肝之品藥物尚多而何以必須此當歸柴胡哉大凡藥物之有弊者當仿此法而行之非特保全病人免增他症抑亦醫家事半功倍之要道也房後傷風之症人多不肯言也切脈足以知之右寸甚散左尺甚弱此房後也切脈既定細細詢問殆百不失一矣其所見之症與傷風無異其所服之藥則不可率爾也吾嘗見房後傷風服表劑一帖而殞命者屢矣房後之傷風然則其不表散乎曰不表散不可也而表散之藥無論何藥皆不可服惟生黃耆足以發其表兼以扶腎之弱收肺之散隨證佐以不犯禁忌之品一劑而亦可安矣吾已曾經奏效矣遺後傷風亦同斯義遺泄之病一曰夢遺則肝為之也肝能構象一切與醒時交媾無異君火相火其畢至焉一曰自遺則腎為之也俗謂之心腎不交究之心不任咎也當謂之水火不交水火者腎中之水火火乃相火之火非君火之火也夢遺之際君火尚有權自遺則君火無權矣君火無權而相火僭其權相火僭君火之權自與腎水不相合並與腎不合水不濟火火熾逼精而自遺矣俗謂用心太過則有遺症不可謂之用心直可謂之用肝太過而已矣肝主疏泄遺泄者疏泄之極也偶爾自遺尚無甚關係肝氣寧靜眠睡穩熟則自不發若常常患此則氣血兩傷脾肺不能統肝腎不能潛相火孤壯腎水不足以制之則將有自焚之象此癆瘵之所由成也自遺治法第一不可徒澀也澀藥多滯氣氣滯而血不行反生他症惟有養肺扶脾以益氣暢肝滋水以生血則庶幾其有濟乎此等病症全視乎人之自衛自衛亦多端矣而皆為普通知識所有不能歷歷而數之若夫專恃醫家乞靈草木以挽回之蓋亦不可必得之數矣背陽也而血存焉胸腹陰也而氣存焉即此可悟陰陽不能相離之義長沙傷寒第一方曰桂枝湯奇方也其所轄之症不知其凡幾也長沙主義以為發表也無汗者發之有汗者收之如發表矣調和營衛即此方也桂枝和衛氣酒芍和營血甘草和中膻中大氣痛桂枝驅邪酒芍斂正亦即此方也膻中之氣邪正交鬨非此無以解之脾肝兩家之氣痛桂枝可以達陽氣於四肢脾主四肢也酒芍可以調和肝氣平壓肝氣也且桂亦可平肝芍亦可以斂脾甘芍又可以止痛小兒之腹痛婦人之氣痛推而及於癆瘵亦有可用此方之理吾乃詳審而精思之自立一方曰雙關飲即仍桂枝湯之藥而加以苓朮耳脾肝兩家之病極多桂芍入肝苓朮入脾甘草以和肝脾之氣曰雙關者兩關脈之要劑也吾持此以診病是吾一人執簡馭繁之法然每用此而得效吾不能不服長沙立方之精妙矣此方如遇熱症則不能不稍加變通萬不可呆用術與桂皆近於熱者也如不能用術則去朮俟其熱退而用之如不能用桂枝則改用桑枝千變萬化總不能離乎此五者然甘草之品吾尚不常用也吾持此以馭病其不能符合者蓋幾希矣人生後天之賴以生者脾也脾主食能食不食亦視乎脾之健不健耳脾之不健何物足以幢之惟白朮耳脾喜燥術之性有燥脾喜潤故易受濕術之油能潤脾有濕術可燥濕脾有痰術可以除痰脾系胎術可以安胎脾主帶術可以止帶脾繫腰術可以暖腰脾為後天之宗術為脾家之宗術以健脾脾氣一旺百體安而百病除矣或者謂白朮有橫中之弊人身之脾全體之機關也機關掉運既靈能足其消化之力食既安而眠亦穩何至生病術者所以靈其機關也安有橫中之弊哉其所以冤為橫中者方中必有滯氣之品氣不利又加以滯食之品又不肯重用白朮白朮掉運之力不足以敵其滯氣之力故妄認白朮為橫中若單服白朮一味以試其橫中與否則白朮之冤伸矣又或謂白朮有閉氣之弊術以健脾脾尚輸氣於肺以生金以成其子肺之功肺為氣家宗主其母倘閉其氣如何能輸氣於子以盡其生育之道所謂閉氣者其冤詞與橫中等蓋氣既滯矣不能收流利之功遂乃誣為閉氣吾診病多矣閉氣之證固未之見服白朮而閉氣尤為無稽閉氣為死耶則白朮非毒人之物閉氣為不通耶則白朮乃流利之品吾只見夫食少者服白朮而能食腹泄者服白朮而止泄未聞有橫中閉氣之弊也若如所說則本草中何品為無弊耶何品而可服耶禁用白朮則生機將絕何也後天無扶助之力矣不用白朮而慣用山藥本流利之區膠固泥封而不得通暢山藥之罪殆無所推諉矣吾祖行醫時人皆呼之為周白朮先生其慣用白朮也無疑其慣用白朮而未有弊也無疑借乎吾祖無著述無所說以存斯理耳白朮扶脾陽山藥理脾陰是也然脾之陰適當肝之陽料理肝陽而脾陰得所養矣山藥一品不可不慎審也大凡今之人氣不流利者殆居多數而婦科尤甚山藥最足滯氣故不宜輕用脾主食肝主眠脾健則食旺肝暢則眠安脾虛脾滯則食減肝旺肝鬱則眠不穩且也胃有宿食或飽或飢而眠不得適夜或失眠口無津液而食不得適兩者相因以為用而相累以為害能食能眠百病皆退不食不眠百病乃叢集余診病切其右脈問能食否切其左脈問能眠否此扼要之道也能食能眠自無岐出之症不食不眠乃有相因之病不食不眠之病依其次序一一以詢之或有或無提其綱而挈其領無難確有把握也一病也上熱而下寒用熱藥則礙其熱用涼藥則礙其寒此何法以處之曰其惟和氣以降其上熱而散其下寒乎如寒甚也非散所能解則將用偷關之法以治之此法余醫學實驗中甚多無不可以取效也一病也寒與熱同在一處既發寒症又現熱症如疝氣而兼淋症之類此何法以處之曰其惟雙治之法乎寒熱兼治溫涼並施如萸連並用之類亦無不可以取效是在用者之得法耳男子之精血也婦人之乳血也血色紅而精與乳皆色白何也血之成熟由火化而變也癆瘵之吐白亦血也血無火化並不能變色而即出也精也乳也白沫也此三者夜盛之而露於天空晨起而化為紅色無氣以化之反其本耳人身之有血道猶水之行於河道也河道之水自行之血道之血則有氣並之以行也氣血並行周流而不息則人乃無病氣或虛矣或滯矣無率血之命令而血無所適從必覓一空隙開口之處橫決氾濫而必求其所以行之之道以針刺皮則出血以刀斫則更甚可知血遇口即行之道於是乎有吐血之症吐血者肺不足以攝之脾不足以統之肝不足以藏之竄入胃經由胃吐出水性就下血性只求其行而已故由上而吐之血亦不計其順逆也血前之症曰咳嗽者肺金之燥也血不從肺之命令肺焉得而不燥血不安其位金不得水之滋潤金水隔閡乃成燥症曰背脹者背為血海血既不安與氣背道而馳背焉得而不脹曰夜不眠者肝不藏血即不藏魂夜眠焉得而穩有此三症血無不吐者矣既吐之後百病叢集幾乎五臟六腑無一不病焉者然須察其病之發於某家也如發於肺則理其肺如發於脾則理其脾發於此二家猶有可以施治之方如其發於肝腎也則兩尺脈搖搖如懸漣根本不牢枝葉焉能長久如此者雖有善者亦無如之何也矣血症不可妄潤也血症不可強止也妄潤與強止則凝而為瘀而已矣成瘀之後行瘀則傷氣不行瘀則損新其若之何治血症之法萬緒千頭以脈象為主要未可以空談也衄血也便血也血淋也皆熱也濁精而淋血淋血者變精之未成者也此數症施治尚有術惟血崩之症施治較難血崩與吐血為一例亦氣不能率血以行血亟於行乃乘隙而為崩然崩症較吐血症易愈崩症大補氣血系一條鞭之治法非若吐症之棘手吐勢逆而崩勢順且只一虛症補養亦非難事故吐有絕症而崩尚無絕症也淋濁之症大半起干受濕熱大半起於忍精濕熱易愈忍精難愈精既動矣萬無復返故居之理忍精以縱一時之欲則淋濁以貽長日之憂兩症相較濁尚無妨諸淋相較沙石尤苦淋濁者敗精積於精道氣不足以化之愈積愈久敗精成為堅質氣化更難故成沙石之淋沙石無治法死而已矣崩症不常見也帶症則百人而百有矣何也脾土之氣虛也脾氣虛則易受濕濕則帶病見矣婦女肝病居十之八九肝既病則脾不得不病且也脾系在腰腰為帶脈之所在帶脈之氣虛加以脾氣又虛焉得而不病帶哉病帶之人受孕而帶止受孕而帶不止其胎必墜故治帶之法不在血分而實在氣分帶症南方之婦女居多數痢症者寒熱相併之症也肺受熱移入大腸大腸既有熱而脾復受寒寒欲利而熱不利彼此相爭於是乎有氣墜之症墜而下紅白者大腸中之寒熱氣化而為之也熱之氣化為紅寒之氣化為白此中尚有濕氣一項欲痢不痢艱苦萬狀此雖系萸連之正症然銖兩之間不可不審其輕重亦有偶用微升之品者則以其肺氣之大虛雖用升提必兼降下以符其欲痢不痢之意以相敵若專升則墜更劇矣瘧症者亦寒熱相併之症也此症較痢更劇較痢為難治其始也亦內有熱據之也繼而外感風寒或未表或已表而傳經之後與熱邪爭持交鬨於其中於是乎發為寒熱之症其所以得汗而止者寒熱交爭兩氣熏灼乃逼而為汗究之氣血不和營衛隔絕雖汗亦不解其邪既止之後邪尚潛居於脾肝之間或次日或越日氣行相觸則仍發焉其所以有一定時間者因某家之氣當其時而稍殺遂乘之而發或早或遲皆此理也寒熱之久傳於三陰亦宜升提至於陽分方利於施治萬萬不可妄投陰劑以牢固之若夫體虛之人加以久瘧而更虛則雖欲補之亦宜兼以滌除邪氣調和營衛之品然補陰之劑則宜慎擇而慎施之也又有一種似瘧非瘧之症則只切其脈而施其劑不間其瘧不瘧也癆瘵中間有見此症者則陽虛生內寒陰虛生外熱之說施治棘手然亦只能料理營衛而調和之兼以補劑奏效甚難若遇瘧而妾投截藥底裡不清勉強抑制未必無目前之效或逾時而即發或歷久而仍發邪氣潛據於中強遏之其能久乎有脈中之病有脈外之病切其脈而不知其所以然則當細思其病之所在而研究其所以治之之法此類病大率宜於針灸不知針灸之法而徒恃湯藥吾滋恿焉恧音然慚愧沉脈之為寒無疑也洪弦之脈不定為熱細數之脈不可定為無救此皆余所經驗而幸無為其所誤也寸口脈浮大浮為無血大即為寒又脈浮而大浮為氣實大為血虛此仲景之語當思所以大即為寒大為血虛之理須知其病脈須知其為醫所誤之脈此理仲景言之綦詳宜隨證而細思之嘔吐後之脈咳嗽後之脈當慎重詳細以觀之脈者精微之學也而精微出於平淡愈推愈廣愈求愈獲此喻嘉言氏之說也精微出於平淡一語尤為至理名言高遠之旨出於中庸賢聖之道在於日用即此理也凡切脈初上指時未定也果平心靜氣調勻呼吸而病者之脈亦隨之而定既定之後方足以知病之所在如其久不定也則是病脈之本象如此又當思其是否本象或有所因而致之則當察其所因之為何而後除其所因之脈而驗之則失之鮮矣所因者或因咳嗽之後或因用力之後則脈象必不能定以此類推非一端也脈象中微茫恍惚空靈縹緲當以神會而知其病之所在此固非庸工之所得而知然以此渺茫之詞持以語人人亦安能解之是以說病證說療抬之時仍須平正樸實淺近易曉人乃信我我乃得以施其術若高言玄妙則是道聽塗說自輕之道也而況未必玄妙乎玄妙之處真有令人不可思議者欲言之而窮於詞欲書之而窘於筆將如斯而已乎或疑為欺入之談也吾得約略而言之曰脈之來往氣之來往也於脈息來往之中靜其心澄其意以觀其氣之來往或清爽而弦硬也或模糊而濡軟也雖不可以一言盡而要可以三隅反以氣為實在之物而切實以研究之以氣為空靈之物而想像以擬議之要之明於萬事萬物之理而後可以與於斯稍有隔閡不能也稍有拘滯不能也切脈於來去遲疾之間冥心遊神以想像而推測之證之症漸次而與所見相合則百切而百中其有不中者又從不中之處分別而研究之其於切脈思過半矣血非氣不能行也婦科之病往往血不足而氣有餘有餘之氣無血配之是不免馳驟之虞馳驟而不合其行度則蹇澀阻滯之弊生焉於是乎有痛症於是乎有熱症百病之起皆由於此脈象之數之弦皆生於此不必其數為熱弦為風也凡有毒之脈無不弦也毒甚者弦甚毒輕者弦不甚此確有把握者也更證之以症則知所以解之之法矣脈象中之緊字非心領神會不能得其妙處徒恃口說不能摹擬萬一大腸小腸胃與膀胱皆受不淨惟膽為清淨之府惟清淨也故能決斷五臟不和則九竅不通六腑不和則留結為癰此數語當細思之嘔家有寒症有熱症有肝風症有蟲症惟蟲症為難看大率六脈大亂者為蟲症得飲食而毫不停留為蟲症血猶水也肝猶魚也以水養魚水多而魚靜以血養肝血足而肝暢肝只有養之一法無補法也養則生血為一義滋水為一義肝旺肝鬱皆不可以不養鎮肝壓肝之說偶一為之猶可若用之不得其道是水涸而魚躍以巨石壓之魚不其死矣乎中寒而口無滋味只有一木味熱則或甜或苦或酸時有不同蓋寒在一處擾亂脾胃故只有木之一味熱則各家由內而發外者也故各家有各家之味盡達於脾胃脾胃不能化盡見於舌平人之口中無甚異味者脾胃能化之故也小兒啼哭以乳亟止之又乳久未食停蓄多時小兒驟以口含之如風發泉湧兩者皆足以停積胃脘而生痰痰甚生風驚症由斯而起者多矣小兒風證其面色似無病者以風能華色也淚乾嚏不出者風也閉塞肝腎肺之竅也小兒發燒半由於風寒半由於停滯又有由於痰盛者又有由於風盛者非止一端各隨證見當以極空靈極聰穎之心光眼光照之有小兒便秘者經紋沉伏而底裡隱約紫色余以吳茱萸黃連投之一劑而愈童便之退骨蒸確有效驗如病者嫌之當勿令其知之也一歲以內無病小孩之便方無臊氣若穀食之便則臊氣頗重一旦知覺其術難施矣熱證中有萬不能不用熱藥者惟吳萸肉桂二品可以用之薑附太切實熱家最忌之物也萸桂空靈妙在能化氣故熱證中可用之然須看到極活潑處方可放膽此所以貴乎有識也紅崩之證只有大補氣血之一法勿用凝滯之品而已竟有以龍骨牡蠣塞之者失皿過多腹中空空洞洞強塞而不令其崩其可得乎且塞而不通氣無所泄於是乎腫證生焉蓋氣與血相耦而相配者也血失過多血不足而氣有餘氣乃單行有餘之氣不得循經道加以肺虛而無司令之權有餘之氣遂散而竄入皮毛乃成腫證必俟其血漸生漸長足以與氣相配肺家亦有司令之權而後腫氣乃退蓋不易得之數也用藥之法須質實而空靈乃可得效若執泥古方非徒無益又害之也
