front:
  text: 姚序惜抱先生嘗言醫之為道至精且厚苟非慈明篤厚之君子不能究其義雖有慈明篤厚之心苟不世業而少習猶不能盡其曲折變移之理審其幾微而察其離合余因慨夫中國士大夫視醫為曲技習之者往往挾負販之心作身口之計故其道益微其術亦因而寡驗自西方之術入中國藥物器械居處飲食皆精好有法度用之而多效群以為中國醫術不如遠甚又孰知夫聖人之制久而失傳習之者又多非其人也使得明王在上博求慈明篤厚之君子設科而世守之因其遺書博稽精研而取證西方之術於先聖之業縱不能驟明十可得五六焉長沙周郢生大令嘗宰吾邑間為余稱其弟生中書通說文工小篆大父少呂先生故名醫也中書盡得其秘余心識之今年與大令相遇京師出中書二書曰靖庵說醫醫學實驗乞余為序其詞斐然有根本又多得於躬驗非所謂慈明篤厚之君子世業而少習者耶惜乎君已前卒余也寡陋不能如惜抱少覽方書無以窺見君之所得也乃述往者私懷所蘊書以歸之郢生云己未中秋桐城姚永概汪序內經言醫理推本陰陽外之淫於六氣內之傷於七情皆得以陰陽之理賅之而文義古奧後人苦其難讀遂謂五運六氣之說羌無故實舍正路而不由自以為循曲徑而求通別有其筒易之道於是醫家之偏僻謬妄者或師心自用或立異鳴高亙數千年而不可究詰豈知病必有其所由來亦必有其所由受人身皮毛肌肉關節經絡之不同與表裡上下左右深淺之各異病之來也各有其因而其受之也亦各有其處不知其因復不知其處是必舍病不治而轉傷其無病之臟腑是醫藥非所以生人而轉以殺人矣奚其可哉昌嘗謂內經者醫之體也而其用則為仲師之傷寒論傷寒分三陰三陽以論治舉凡經之為病氣之為病表之為病里之為病腑之為病以逮合病並病無不有其規矩言傷寒而雜病賅焉但但然至簡至易之道也然而難為俗人言之斯醫術之不幸而斯人之大不幸也昌也蓋不勝風雨雞鳴之感垂五十年矣乃者嘗與長沙周云隱先生遇與論醫而合蓋其體內經而用傷寒論也又能神明於規矩心嚮往之無何先生歸道山越七年先生之子筠伯輯先生所為醫學二書將付梓人而來請序莊誦一過其所得於內經傷寒者不獨升堂且入於室歡喜讚歎未能自己謹述所懷以為之序癸亥立冬前十日婺源汪岩昌時年七十有六郭序善化周君筠伯弟錄先德云隱中書靖庵說醫醫學實驗二書余既從受讀詳其大要蓋音研摩也精靈素以肢體之全通變張機傷寒以盡用之大而音淫深也戒墨守一篇之中三致意焉先是中書大父少呂贈公以醫術名世顧未有書輒時從所得諸傳聞窺探施治之奧齊之宜默識心通隱如及親承教先世絕業遂復大光為人疏方每多懸解見者始或吒怪異古師說既乃大服無間言昔墨翟莊周博極群書及各引臾同搜古誼成一家言並糟粕陳言規學人廢讀是拘牽文句之中無能通意文句之外其流之弊將不可勝嘆況於消息陰陽之微剖析形氣之變衡量藥味之滋神而明之存乎其人尤難為泥執乎中書反復發正戒無輕言治醫特自揭所心得開示途徑之從入壹原本五學無待它求能精五學推而致之醫有餘師焉五學未明貿然覬醫專精終必不能為十全也雖不為醫循五學以講於生之自衛抑病可卻年可延亦絕殊專務怪迂之蔽惑已班固敘方技為四種醫經原血脈經絡骨髓之本經方辨五苦六辛水火之齊劑此切脈服藥以起疾者也得中書為發凡起例然後黃農之秘可得而述即論病及國原診知政且鑿然內信於心皆有徵驗矣房中節外樂內情之淫神仙保賦性受命之真此調息窒欲以衛生者也得中書為挈綱舉要然後廢絕諸誕欺謬悠之文反求之五學皆生生之具烏睹取效有後房中神仙哉是故中書操術世頗驚歎其神奇及徵考遺說固自平實有徹跡可循聖王之所以教王宮之一守賴以不隊墜失豈僅能世其業張一家之私說歟而醫人讀之不迷於受方無患為罔病夫讀之粗明病所從受亦無患為殆中書之耋一世於無涯之年功亦豈在禹下耶中書其它撰述甚富筠伯以是二書最為切要先殺青以傳可謂善繼述者也故為敘列其大指俾覽者知所折衷焉甲子冬湘陰郭焯瑩敘
